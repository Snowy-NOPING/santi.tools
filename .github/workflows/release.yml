name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install

      - name: Download yt-dlp sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/bin | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile "src-tauri/bin/yt-dlp-x86_64-pc-windows-msvc.exe"
          Write-Host "yt-dlp downloaded"

      - name: Build Tauri app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEST_CLIENT_SECRET: ${{ secrets.NEST_CLIENT_SECRET }}
        run: bun tauri build

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Find Tauri NSIS installer
        id: tauri_exe
        shell: pwsh
        run: |
          $nsis = Get-ChildItem -Recurse src-tauri/target/release/bundle/nsis `
            -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsis) { throw "Tauri NSIS installer not found" }
          echo "PATH=$($nsis.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "Found: $($nsis.FullName)"

      # ── Build the custom animated Inno Setup installer ──
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Generate installer artwork
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing

          # Sidebar image 164x314 — dark with purple glow
          $bmp = New-Object System.Drawing.Bitmap(164, 314)
          $g   = [System.Drawing.Graphics]::FromImage($bmp)
          $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
          $g.Clear([System.Drawing.Color]::FromArgb(10, 10, 10))
          $brush = New-Object System.Drawing.Drawing2D.LinearGradientBrush(
            [System.Drawing.Point]::new(0,0), [System.Drawing.Point]::new(164,200),
            [System.Drawing.Color]::FromArgb(90, 212, 160, 255),
            [System.Drawing.Color]::FromArgb(0, 10, 10, 10))
          $g.FillRectangle($brush, 0, 0, 164, 220)
          $f1 = New-Object System.Drawing.Font("Segoe UI", 15, [System.Drawing.FontStyle]::Bold)
          $f2 = New-Object System.Drawing.Font("Segoe UI", 15, [System.Drawing.FontStyle]::Regular)
          $g.DrawString("santi",  $f1, (New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(212,160,255))), 14, 262)
          $g.DrawString(".tools", $f2, (New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(136,136,136))), 68, 262)
          $g.Dispose(); $bmp.Save("installer/wizard-image.bmp", [System.Drawing.Imaging.ImageFormat]::Bmp); $bmp.Dispose()

          # Small image 55x55 — purple circle with S
          $b2 = New-Object System.Drawing.Bitmap(55, 55)
          $g2 = [System.Drawing.Graphics]::FromImage($b2)
          $g2.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
          $g2.Clear([System.Drawing.Color]::FromArgb(10,10,10))
          $br2 = New-Object System.Drawing.Drawing2D.LinearGradientBrush(
            [System.Drawing.Point]::new(0,0), [System.Drawing.Point]::new(55,55),
            [System.Drawing.Color]::FromArgb(212,160,255),
            [System.Drawing.Color]::FromArgb(124,92,191))
          $g2.FillEllipse($br2, 4, 4, 47, 47)
          $f3 = New-Object System.Drawing.Font("Segoe UI", 20, [System.Drawing.FontStyle]::Bold)
          $g2.DrawString("s", $f3, (New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(10,10,10))), 12, 10)
          $g2.Dispose(); $b2.Save("installer/wizard-small.bmp", [System.Drawing.Imaging.ImageFormat]::Bmp); $b2.Dispose()

          Write-Host "Artwork generated"

      - name: Build custom installer
        id: custom_installer
        shell: pwsh
        run: |
          $version  = "${{ steps.version.outputs.VERSION }}"
          $nsisExe  = "${{ steps.tauri_exe.outputs.PATH }}"

          New-Item -ItemType Directory -Force -Path dist | Out-Null

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=$version `
            /DNsisExe="$nsisExe" `
            /O"dist" `
            /F"santi.tools-$version-setup" `
            "installer/installer.iss"

          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed" }

          $out = "dist/santi.tools-$version-setup.exe"
          Write-Host "Built: $out ($([math]::Round((Get-Item $out).Length/1MB,1)) MB)"
          echo "PATH=$((Resolve-Path $out).Path)" >> $env:GITHUB_OUTPUT

      # ── Read changelog ──────────────────────────────────
      - name: Read changelog
        id: changelog
        shell: pwsh
        run: |
          $ver   = "${{ steps.version.outputs.VERSION }}"
          $lines = Get-Content CHANGELOG.md
          $cap   = $false
          $notes = [System.Collections.Generic.List[string]]::new()
          foreach ($line in $lines) {
            if ($line -match "^## \[$([regex]::Escape($ver))\]") { $cap = $true; continue }
            if ($cap -and $line -match "^## \[") { break }
            if ($cap) { $notes.Add($line) }
          }
          $body = ($notes -join "`n").Trim()
          if (-not $body) { $body = "see commits for changes." }
          Set-Content release-notes.md $body

      # ── Publish GitHub Release ──────────────────────────
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag      = "${{ github.ref_name }}"
          $version  = "${{ steps.version.outputs.VERSION }}"
          $installer = "${{ steps.custom_installer.outputs.PATH }}"
          $nsisRaw  = "${{ steps.tauri_exe.outputs.PATH }}"

          $existing = gh release view $tag --repo Snowy-NOPING/santi.tools 2>&1
          $isDraft  = $existing -match "draft"

          $releaseArgs = @(
            "--repo", "Snowy-NOPING/santi.tools",
            "--title", "santi.tools v$version",
            "--notes-file", "release-notes.md"
          )

          if ($isDraft) {
            gh release edit $tag @releaseArgs
            if (Test-Path $installer) {
              gh release upload $tag $installer --repo Snowy-NOPING/santi.tools --clobber
            }
            gh release edit $tag --repo Snowy-NOPING/santi.tools --draft=false
          } else {
            $files = @()
            if (Test-Path $installer) { $files += $installer }
            gh release create $tag @files @releaseArgs
          }

          Write-Host "Release v$version published"
          Write-Host "https://github.com/Snowy-NOPING/santi.tools/releases/tag/$tag"
